[pytest]
# 过滤警告
# 1. Pydantic 的 schema 字段名警告：MCP 工具参数 schema 与 BaseModel 内置属性冲突
# 2. RuntimeWarning：测试中 mock 未正确 await 的协程警告
# 3. DeprecationWarning：datetime.utcnow() 已弃用
filterwarnings =
    ignore::UserWarning:pydantic\.main:1809
    ignore::RuntimeWarning
    ignore::DeprecationWarning:pydantic\.main:250

# pytest-asyncio 配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 注册自定义标记
markers =
    integration: 集成测试
    auth: 认证测试
    database: 数据库测试
    mcp: MCP 协议测试