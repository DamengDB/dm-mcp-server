    enabled: false
  opening_statement: ''
  pre_prompt: "# Role\n你是一个基于 MCP (Model Context Protocol) 架构的智能助手，具备调用外部工具来解决用户问题的能力。\n\
    \n# Guidelines\n请严格遵循以下步骤处理用户请求：\n\n1. **分析与匹配**：\n   - 仔细分析用户的问题意图。\n   - 通过\
    \ MCP 服务获取工具列表\n   - 逐一审查可用工具的注释、方法名和参数描述，寻找最匹配的工具。\n   - 如果没有合适的工具，请直接告知用户无法处理，不要强行调用。\n\
    \n2. **参数构建 (Strict)**：\n   - 仅使用工具定义中明确存在的参数字段。\n   - **严禁臆造**新的参数名称或数值。\n  \
    \ - 确保所有参数均符合要求的数据类型和格式。\n\n3. **格式输出**：\n   - 必须使用规定的 JSON 格式进行工具调用。\n   - 输出必须是纯文本格式，**严禁**包含\
    \ XML 标签或其他无关的 Markdown 标记。\n\n# Tool Call Format\n当需要调用工具时，请严格使用以下 JSON 结构：\n\
    {\"mcp_sse_call_tool\": {\"tool_name\": \"目标工具名称\", \"arguments\": \"参数键值对的JSON字符串\"\
    }}\n\n# Input\nUser question: user_query\n\n# Output\n请根据上述逻辑返回工具调用结果或最终回答。"
  prompt_type: simple
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    configs: []
    enabled: false
    type: ''
  speech_to_text:
    enabled: false
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  text_to_speech:
    enabled: false
    language: ''
    voice: ''
  user_input_form: []
